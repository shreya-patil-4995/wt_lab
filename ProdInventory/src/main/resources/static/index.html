<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
        }

        h2 {
            color: #34495e;
            margin-top: 30px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        form {
            background: #ecf0f1;
            padding: 15px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        label {
            display: inline-block;
            width: 100px;
            margin-bottom: 8px;
        }

        input[type="text"], input[type="number"] {
            width: 220px;
            padding: 5px;
            margin-bottom: 10px;
            border: 1px solid #aaa;
            border-radius: 3px;
        }

        button {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 7px 16px;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 5px;
        }

        button:hover {
            background-color: #1a6fa3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 8px;
            text-align: left;
        }

        td {
            padding: 8px;
            border: 1px solid #ccc;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        #message {
            color: green;
            font-weight: bold;
            margin: 8px 0;
        }

        .del-btn {
            background-color: #e74c3c;
        }

        .del-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Product Inventory Management System</h1>
    <p style="text-align:center; color:gray;">Spring Boot + MongoDB | Basic Auth: admin / admin123</p>

    <div id="message"></div>

    <!-- ADD PRODUCT FORM -->
    <h2>Add Product</h2>
    <form id="addForm">
        <label>Name:</label>
        <input type="text" id="prodName" placeholder="Product Name" required><br>
        <label>Category:</label>
        <input type="text" id="prodCategory" placeholder="Category" required><br>
        <label>Price:</label>
        <input type="number" id="prodPrice" placeholder="Price" step="0.01" required><br>
        <label>Quantity:</label>
        <input type="number" id="prodQty" placeholder="Quantity" required><br>
        <button type="submit">Add Product</button>
    </form>

    <!-- GET BY ID FORM -->
    <h2>Get Product by ID</h2>
    <form id="getForm">
        <label>Product ID:</label>
        <input type="text" id="searchId" placeholder="Enter Product ID" required>
        <button type="submit">Search</button>
    </form>

    <!-- UPDATE PRODUCT FORM -->
    <h2>Update Product</h2>
    <form id="updateForm">
        <label>Product ID:</label>
        <input type="text" id="updateId" placeholder="Enter Product ID" required><br>
        <label>Name:</label>
        <input type="text" id="updateName" placeholder="New Name" required><br>
        <label>Category:</label>
        <input type="text" id="updateCategory" placeholder="New Category" required><br>
        <label>Price:</label>
        <input type="number" id="updatePrice" placeholder="New Price" step="0.01" required><br>
        <label>Quantity:</label>
        <input type="number" id="updateQty" placeholder="New Quantity" required><br>
        <button type="submit">Update Product</button>
    </form>

    <!-- DELETE PRODUCT FORM -->
    <h2>Delete Product</h2>
    <form id="deleteForm">
        <label>Product ID:</label>
        <input type="text" id="deleteId" placeholder="Enter Product ID" required>
        <button type="submit" class="del-btn">Delete Product</button>
    </form>

    <!-- ALL PRODUCTS TABLE -->
    <h2>All Products</h2>
    <button onclick="loadProducts()">Refresh List</button>
    <table id="productTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody id="productBody">
            <tr><td colspan="5" style="text-align:center;">Click "Refresh List" to load products</td></tr>
        </tbody>
    </table>
</div>

<script>
    const BASE_URL = "http://localhost:8080/api/products";
    const AUTH = "Basic " + btoa("admin:admin123");

    function showMsg(msg, isError = false) {
        const el = document.getElementById("message");
        el.style.color = isError ? "red" : "green";
        el.textContent = msg;
    }

    // ADD
    document.getElementById("addForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const product = {
            name: document.getElementById("prodName").value,
            category: document.getElementById("prodCategory").value,
            price: parseFloat(document.getElementById("prodPrice").value),
            quantity: parseInt(document.getElementById("prodQty").value)
        };
        fetch(BASE_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": AUTH },
            body: JSON.stringify(product)
        })
        .then(res => res.json())
        .then(data => { showMsg("Product added! ID: " + data.id); loadProducts(); })
        .catch(() => showMsg("Error adding product", true));
    });

    // GET BY ID
    document.getElementById("getForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const id = document.getElementById("searchId").value;
        fetch(BASE_URL + "/" + id, {
            headers: { "Authorization": AUTH }
        })
        .then(res => {
            if (!res.ok) throw new Error("Not Found");
            return res.json();
        })
        .then(data => showMsg("Found: " + JSON.stringify(data)))
        .catch(() => showMsg("Product not found", true));
    });

    // UPDATE
    document.getElementById("updateForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const id = document.getElementById("updateId").value;
        const product = {
            name: document.getElementById("updateName").value,
            category: document.getElementById("updateCategory").value,
            price: parseFloat(document.getElementById("updatePrice").value),
            quantity: parseInt(document.getElementById("updateQty").value)
        };
        fetch(BASE_URL + "/" + id, {
            method: "PUT",
            headers: { "Content-Type": "application/json", "Authorization": AUTH },
            body: JSON.stringify(product)
        })
        .then(res => {
            if (!res.ok) throw new Error("Not Found");
            return res.json();
        })
        .then(() => { showMsg("Product updated successfully!"); loadProducts(); })
        .catch(() => showMsg("Update failed. Check ID.", true));
    });

    // DELETE
    document.getElementById("deleteForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const id = document.getElementById("deleteId").value;
        fetch(BASE_URL + "/" + id, {
            method: "DELETE",
            headers: { "Authorization": AUTH }
        })
        .then(res => res.text())
        .then(msg => { showMsg(msg); loadProducts(); })
        .catch(() => showMsg("Delete failed. Check ID.", true));
    });

    // LOAD ALL
    function loadProducts() {
        fetch(BASE_URL, { headers: { "Authorization": AUTH } })
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById("productBody");
            if (data.length === 0) {
                tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No products found</td></tr>";
                return;
            }
            tbody.innerHTML = "";
            data.forEach(p => {
                tbody.innerHTML += `<tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>${p.category}</td>
                    <td>${p.price}</td>
                    <td>${p.quantity}</td>
                </tr>`;
            });
        })
        .catch(() => showMsg("Could not load products", true));
    }
</script>

</body>
</html>
