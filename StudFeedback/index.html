<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Feedback Form</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      color: #333;
    }

    header {
      background-color: #2c6fad;
      color: white;
      padding: 15px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 22px;
    }

    header p {
      font-size: 13px;
      margin-top: 4px;
    }

    .container {
      max-width: 750px;
      margin: 25px auto;
      padding: 0 15px;
    }

    .card {
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 17px;
      margin-bottom: 15px;
      color: #2c6fad;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #bbb;
      border-radius: 4px;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    select:focus,
    textarea:focus {
      border-color: #2c6fad;
    }

    textarea {
      resize: vertical;
      height: 80px;
    }

    .rating-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .rating-group label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .error {
      color: red;
      font-size: 12px;
      margin-top: 4px;
    }

    .btn {
      background-color: #2c6fad;
      color: white;
      border: none;
      padding: 9px 22px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 8px;
    }

    .btn:hover {
      background-color: #245a8e;
    }

    .btn-reset {
      background-color: #888;
    }

    .btn-reset:hover {
      background-color: #666;
    }

    .success-msg {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 14px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    table th {
      background-color: #2c6fad;
      color: white;
      padding: 9px 10px;
      text-align: left;
    }

    table td {
      padding: 8px 10px;
      border-bottom: 1px solid #ddd;
    }

    table tr:nth-child(even) {
      background-color: #f7f9fc;
    }

    .badge {
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge-5 { background-color: #d4edda; color: #155724; }
    .badge-4 { background-color: #cce5ff; color: #004085; }
    .badge-3 { background-color: #fff3cd; color: #856404; }
    .badge-2 { background-color: #fde2e2; color: #721c24; }
    .badge-1 { background-color: #f8d7da; color: #721c24; }

    .no-data {
      text-align: center;
      color: #888;
      padding: 20px;
      font-size: 14px;
    }

    .ref-note {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }
  </style>
</head>
<body>

<header>
  <h1>Student Feedback System</h1>
  <p>Submit your feedback for the course / session</p>
</header>

<div id="root"></div>

<!-- React via CDN -->
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

  const { useState, useRef } = React;

  // --- Feedback Form Component ---
  function FeedbackForm({ onSubmit }) {
    const [formData, setFormData] = useState({
      studentName: "",
      email: "",
      course: "",
      facultyName: "",
      rating: "",
      comments: ""
    });

    const [errors, setErrors] = useState({});
    const [submitted, setSubmitted] = useState(false);

    // useRef() to access DOM element (Task 3)
    const nameRef = useRef(null);

    const handleChange = (e) => {
      const { name, value } = e.target;
      setFormData(prev => ({ ...prev, [name]: value }));
      // Clear error on change
      if (errors[name]) {
        setErrors(prev => ({ ...prev, [name]: "" }));
      }
    };

    const validate = () => {
      const newErrors = {};
      if (!formData.studentName.trim())
        newErrors.studentName = "Student name is required.";
      if (!formData.email.trim())
        newErrors.email = "Email is required.";
      else if (!/\S+@\S+\.\S+/.test(formData.email))
        newErrors.email = "Enter a valid email address.";
      if (!formData.course)
        newErrors.course = "Please select a course.";
      if (!formData.facultyName.trim())
        newErrors.facultyName = "Faculty name is required.";
      if (!formData.rating)
        newErrors.rating = "Please select a rating.";
      if (!formData.comments.trim())
        newErrors.comments = "Comments cannot be empty.";
      return newErrors;
    };

    const handleSubmit = (e) => {
      e.preventDefault();
      const validationErrors = validate();
      if (Object.keys(validationErrors).length > 0) {
        setErrors(validationErrors);
        // useRef - focus first field on error (Task 3)
        nameRef.current.focus();
        return;
      }
      onSubmit({ ...formData, id: Date.now() });
      setFormData({
        studentName: "", email: "", course: "",
        facultyName: "", rating: "", comments: ""
      });
      setErrors({});
      setSubmitted(true);
      setTimeout(() => setSubmitted(false), 3000);
    };

    const handleReset = () => {
      setFormData({
        studentName: "", email: "", course: "",
        facultyName: "", rating: "", comments: ""
      });
      setErrors({});
      setSubmitted(false);
    };

    const courses = [
      "Web Technologies",
      "Data Structures",
      "Operating Systems",
      "Database Management",
      "Computer Networks"
    ];

    return (
      <div className="card">
        <h2>Submit Feedback</h2>

        {submitted && (
          <div className="success-msg">
            ✅ Feedback submitted successfully! Thank you.
          </div>
        )}

        <form onSubmit={handleSubmit} noValidate>

          {/* Task 2 - Controlled Component: Student Name */}
          <div className="form-group">
            <label>Student Name *</label>
            <input
              type="text"
              name="studentName"
              value={formData.studentName}
              onChange={handleChange}
              ref={nameRef}
              placeholder="Enter your name"
            />
            {errors.studentName && <p className="error">{errors.studentName}</p>}
            <p className="ref-note">* useRef() applied on this field for focus on error</p>
          </div>

          {/* Controlled Component: Email */}
          <div className="form-group">
            <label>Email *</label>
            <input
              type="email"
              name="email"
              value={formData.email}
              onChange={handleChange}
              placeholder="Enter your email"
            />
            {errors.email && <p className="error">{errors.email}</p>}
          </div>

          {/* Controlled Component: Course */}
          <div className="form-group">
            <label>Course *</label>
            <select name="course" value={formData.course} onChange={handleChange}>
              <option value="">-- Select Course --</option>
              {/* Task 4 - Rendering list with keys */}
              {courses.map((c, index) => (
                <option key={index} value={c}>{c}</option>
              ))}
            </select>
            {errors.course && <p className="error">{errors.course}</p>}
          </div>

          {/* Controlled Component: Faculty Name */}
          <div className="form-group">
            <label>Faculty Name *</label>
            <input
              type="text"
              name="facultyName"
              value={formData.facultyName}
              onChange={handleChange}
              placeholder="Enter faculty name"
            />
            {errors.facultyName && <p className="error">{errors.facultyName}</p>}
          </div>

          {/* Controlled Component: Rating */}
          <div className="form-group">
            <label>Rating (1 = Poor, 5 = Excellent) *</label>
            <div className="rating-group">
              {[1, 2, 3, 4, 5].map(r => (
                <label key={r}>
                  <input
                    type="radio"
                    name="rating"
                    value={r}
                    checked={formData.rating === String(r)}
                    onChange={handleChange}
                  />
                  {r}
                </label>
              ))}
            </div>
            {errors.rating && <p className="error">{errors.rating}</p>}
          </div>

          {/* Controlled Component: Comments */}
          <div className="form-group">
            <label>Comments *</label>
            <textarea
              name="comments"
              value={formData.comments}
              onChange={handleChange}
              placeholder="Write your comments here..."
            />
            {errors.comments && <p className="error">{errors.comments}</p>}
          </div>

          <button type="submit" className="btn">Submit Feedback</button>
          <button type="button" className="btn btn-reset" onClick={handleReset}>Reset</button>
        </form>
      </div>
    );
  }

  // --- Submitted Feedback List Component (Task 5) ---
  function FeedbackList({ feedbacks }) {
    if (feedbacks.length === 0) {
      return (
        <div className="card">
          <h2>Submitted Feedbacks</h2>
          <p className="no-data">No feedbacks submitted yet.</p>
        </div>
      );
    }

    return (
      <div className="card">
        <h2>Submitted Feedbacks ({feedbacks.length})</h2>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Student Name</th>
              <th>Email</th>
              <th>Course</th>
              <th>Faculty</th>
              <th>Rating</th>
              <th>Comments</th>
            </tr>
          </thead>
          <tbody>
            {/* Task 4 - Rendering list with unique keys */}
            {feedbacks.map((fb, index) => (
              <tr key={fb.id}>
                <td>{index + 1}</td>
                <td>{fb.studentName}</td>
                <td>{fb.email}</td>
                <td>{fb.course}</td>
                <td>{fb.facultyName}</td>
                <td>
                  <span className={`badge badge-${fb.rating}`}>
                    {fb.rating} ⭐
                  </span>
                </td>
                <td>{fb.comments}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  }

  // --- Main App Component ---
  function App() {
    // Task 2 - useState() for managing feedback list
    const [feedbacks, setFeedbacks] = useState([]);

    const handleNewFeedback = (feedback) => {
      setFeedbacks(prev => [...prev, feedback]);
    };

    return (
      <div className="container">
        <FeedbackForm onSubmit={handleNewFeedback} />
        <FeedbackList feedbacks={feedbacks} />
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);

</script>
</body>
</html>
